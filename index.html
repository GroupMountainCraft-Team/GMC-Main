<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <meta name="theme-color" content="#0b151a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#edf5f7" media="(prefers-color-scheme: light)" />
  <link rel="icon" href="./assets/icon.jpg" type="image/jpeg" />
  <link rel="apple-touch-icon" href="./assets/icon.jpg" />
  <link rel="stylesheet" href="./assets/site.css" />
</head>
<body>
  <div class="orb-layer" aria-hidden="true">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="orb orb-c"></div>
  </div>

  <div class="site-shell">
    <nav class="top-nav" aria-label="主导航">
      <a class="brand" href="index.html">GMC SERVER</a>
      <div class="nav-links">
        <a class="active" href="index.html" aria-current="page">首页</a>
        <a href="wiki.html">Wiki</a>
        <a href="rules.html">管理规定</a>
        <a href="actives.html">活动公告</a>
      </div>
    </nav>

    <header class="hero-panel reveal">
      <div class="hero-kicker">Group Mountain Craft</div>
      <h1 class="hero-title">生电 · 养老 · 建筑<br />一个长期稳定的<br class="mobile-break" />多玩法社区服</h1>
      <p class="hero-desc">
        这里有完整的服务器 Wiki、管理条例和活动公告。你可以快速找到规则边界、指令系统和每周活动安排，直接开玩，不踩坑。
      </p>
      <div class="btn-row">
        <button class="btn btn-primary mono" type="button" onclick="copyIP()">IP: 91gmc.xyz（点击复制）</button>
      </div>
    </header>

    <section class="grid">
      <a class="card hot-card reveal" href="actives.html">
        <span class="chip hot-chip">重点活动</span>
        <h3>活动公告中心</h3>
        <p>周末双赛联动：奖励、赛制、报名时间一页看全，避免错过报名时段。</p>
      </a>

      <a class="card reveal" href="wiki.html">
        <span class="chip">必读</span>
        <h3>服务器 Wiki</h3>
        <p>经济、领地、杂项指令、符文之地机制与新增附魔入口。</p>
      </a>

      <a class="card reveal" href="rules.html">
        <span class="chip">管理条例</span>
        <h3>服务器管理规定</h3>
        <p>总章、违规分级、公会与假人规则、管理员职责等完整条例。</p>
      </a>
    </section>

    <p class="footer">© 2026 GMC Server Team</p>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="./assets/site.js"></script>
  <script>
    function copyIP() {
      window.gmcUi.copyText('91gmc.xyz', '服务器 IP 已复制');
    }

  </script>

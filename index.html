<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMC 服务器官方主页</title>
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
        }

        body {
            margin: 0;
            font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 英雄背景区域：使用伪元素承载图片并支持可调模糊 */
        .hero {
            width: 100%;
            height: 60vh;
            position: relative;
            overflow: hidden;
            background: transparent; /* 让伪元素背景可见 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 背景图片层：用于模糊并可缩放以避免边缘残影 */
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url('./assets/bg.jpg'); /* 可替换为你的图片路径 */
            background-size: cover;
            background-position: center;
            filter: blur(8px); /* 调节这里的数值来改变模糊强度（px） */
            transform: scale(1.06);
            z-index: 0; /* 背景图置于最底层 */
            will-change: filter, transform;
        }

        /* 叠加半透明渐变，保证文字可读 */
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.35), var(--bg));
            z-index: 1; /* 叠加渐变层，位于背景之上 */
        }

        /* 让 hero 内部文本位于上层 */
        .hero > * { position: relative; z-index: 3; }

        .hero h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
        }

        .server-ip {
            margin-top: 15px;
            padding: 8px 20px;
            background: var(--card-bg);
            border: 1px solid var(--accent);
            border-radius: 20px;
            font-family: monospace;
            cursor: pointer;
            transition: 0.3s;
        }
        .server-ip:hover { background: var(--accent); color: #000; }

        /* 入口导航区 */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
            margin: -50px auto 40px; /* 向上偏移压在 hero 图上 */
            position: relative;
            z-index: 2; /* 确保卡片位于 hero 背景之上，同时低于 hero 文本 */
        }

        .nav-card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s, border-color 0.3s;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .nav-card h2 { margin: 0; font-size: 1.4rem; color: var(--accent); }
        .nav-card p { margin: 0; color: #888; font-size: 0.9rem; }

        .tag {
            font-size: 0.7rem;
            background: #e74c3c;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            width: fit-content;
        }
        /* toast 提示样式 */
        .toast {
            position: fixed;
            left: 50%;
            bottom: 28px;
            transform: translateX(-50%) translateY(16px);
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 12px 18px;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            font-size: 0.95rem;
            opacity: 0;
            pointer-events: none;
            transition: transform 240ms ease, opacity 240ms ease;
            z-index: 9999;
            max-width: calc(100% - 40px);
            text-align: center;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>GROUP MOUNTAIN CRAFT</h1>
        <p>生电 · 养老 · 建筑</p>
        <div class="server-ip" onclick="copyIP()">IP: 91gmc.xyz (点击复制)</div>
    </div>

    <div class="nav-grid">
        <a href="actives.html" class="nav-card">
            <span class="tag">HOT</span>
            <h2>周末双赛联动</h2>
            <p>创意建筑大赛 & PVP 竞技狂欢，赢取「变身棱镜」及丰厚奖金。</p>
            <span style="margin-top:10px; font-size:0.8rem; color:var(--accent);">立即查看详情 →</span>
        </a>

        <a href="#" class="nav-card" style="opacity: 0.6; cursor: not-allowed;">
            <h2>服务器Wiki</h2>
            <p>了解生电服规则、常用指令及红石工程规范。（正在建设中）</p>
        </a>

        <a href="#" class="nav-card" style="opacity: 0.6; cursor: not-allowed;">
            <h2>皮肤站 / 地图</h2>
            <p>访问外置皮肤站或查看实时网页版卫星地图。</p>
        </a>
    </div>

    <footer style="margin-bottom: 40px; color: #555; font-size: 0.8rem;">
        © 2026 GMC Server Team | Powered by GitHub Pages
    </footer>

    <!-- 页面内 toast 元素 -->
    <div id="toast" class="toast" aria-live="polite" role="status" hidden></div>

    <script>
        function showToast(message, duration = 3000) {
            const t = document.getElementById('toast');
            if (!t) return;
            t.hidden = false;
            t.textContent = message;
            t.classList.add('show');
            if (window._toastTimer) clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => {
                t.classList.remove('show');
                // 保持 hidden 一会儿以避免无障碍重复读取
                setTimeout(() => t.hidden = true, 250);
            }, duration);
        }

        function copyIP() {
            navigator.clipboard.writeText('91gmc.xyz').then(() => {
                showToast('IP 已复制到剪贴板，去启动器加入吧！');
            }).catch(() => {
                // 回退提示（某些浏览器在不安全上下文中会失败）
                showToast('复制失败，请手动复制：91gmc.xyz');
            });
        }
    </script>

</body>
</html>

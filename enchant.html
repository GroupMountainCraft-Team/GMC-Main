<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMC 新增附魔大全</title>
  <meta name="description" content="GMC 新增附魔大全，支持搜索附魔名称、中文名、适用装备、获取方式和试炼地点。" />
  <meta name="theme-color" content="#0b151a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#edf5f7" media="(prefers-color-scheme: light)" />
  <link rel="icon" href="./assets/icon.jpg" type="image/jpeg" />
  <link rel="apple-touch-icon" href="./assets/icon.jpg" />
  <link rel="stylesheet" href="./assets/site.css" />
  <style>
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 12px 0 8px;
    }

    .toolbar input {
      flex: 1;
      min-width: 220px;
      border: 1px solid var(--table-input-line);
      background: var(--table-input-bg);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
    }

    .toolbar .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--table-wrap-line);
      border-radius: 12px;
      background: var(--table-wrap-bg);
      margin-top: 10px;
      position: relative;
    }

    #enchantTable {
      --col-1: 170px;
      --col-2: 190px;
      border-collapse: collapse;
      min-width: 1680px;
      width: 100%;
      font-size: 0.92rem;
    }

    th,
    td {
      border-bottom: 1px solid var(--table-cell-line);
      padding: 10px 10px;
      text-align: left;
      vertical-align: top;
      line-height: 1.5;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--table-head-bg);
      color: var(--table-head-text);
      font-weight: 700;
      white-space: nowrap;
    }

    th:nth-child(1),
    td:nth-child(1) {
      width: var(--col-1);
      min-width: var(--col-1);
      max-width: var(--col-1);
      white-space: nowrap;
    }

    th:nth-child(2),
    td:nth-child(2) {
      width: var(--col-2);
      min-width: var(--col-2);
      max-width: var(--col-2);
      white-space: nowrap;
    }

    th:nth-child(3),
    td:nth-child(3) {
      min-width: 120px;
      width: 120px;
      word-break: keep-all;
    }

    th:nth-child(4),
    td:nth-child(4) {
      min-width: 360px;
      width: 360px;
    }

    th:nth-child(5),
    td:nth-child(5) {
      min-width: 110px;
      width: 110px;
      white-space: nowrap;
    }

    th:nth-child(n + 6):nth-child(-n + 11),
    td:nth-child(n + 6):nth-child(-n + 11) {
      min-width: 95px;
      width: 95px;
      text-align: center;
      white-space: nowrap;
    }

    th:nth-child(12),
    td:nth-child(12) {
      min-width: 230px;
      width: 230px;
    }

    th:nth-child(1) {
      left: 0;
      z-index: 5;
    }

    th:nth-child(2) {
      left: var(--col-1);
      z-index: 4;
    }

    td:nth-child(1) {
      position: sticky;
      left: 0;
      z-index: 2;
      background: var(--table-sticky-bg);
    }

    td:nth-child(2) {
      position: sticky;
      left: var(--col-1);
      z-index: 1;
      background: var(--table-sticky-bg);
    }

    tbody tr:hover {
      background: var(--table-row-hover);
    }

    tbody tr:hover td:nth-child(1),
    tbody tr:hover td:nth-child(2) {
      background: var(--table-sticky-hover);
    }

    .muted {
      color: var(--text-dim);
      font-size: 0.86rem;
    }

    .empty-row td {
      color: var(--text-dim);
      text-align: center;
      padding: 22px 12px;
    }

    @media (max-width: 980px) {
      th:nth-child(1),
      th:nth-child(2),
      td:nth-child(1),
      td:nth-child(2) {
        position: static;
      }

      #enchantTable {
        min-width: 1300px;
      }
    }

    @media (max-width: 640px) {
      .toolbar input,
      .toolbar .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="orb-layer" aria-hidden="true">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="orb orb-c"></div>
  </div>

  <div class="site-shell">
    <nav class="top-nav" aria-label="主导航">
      <a class="brand" href="index.html">GMC SERVER</a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a class="active" href="wiki.html" aria-current="page">Wiki</a>
        <a href="rules.html">管理规定</a>
        <a href="actives.html">活动公告</a>
      </div>
    </nav>

    <main class="content panel" style="margin-top: 18px;" id="enchantMain">
      <h1>新增附魔大全</h1>

      <p class="muted" id="statusText">正在加载附魔数据...</p>

      <div class="toolbar">
        <input id="searchInput" type="search" autocomplete="off" placeholder="搜索附魔名、中文名、装备、试炼地点..." aria-label="搜索附魔" />
        <a class="btn" href="wiki.html#enchant">返回 Wiki</a>
      </div>

      <div class="table-wrap">
        <table id="enchantTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="./enchantments-data.js"></script>
  <script src="./assets/site.js"></script>
  <script>
    function parseMarkdownTable(md) {
      const lines = md
        .split('\n')
        .map((line) => line.trim())
        .filter((line) => line.startsWith('|') && line.endsWith('|'));

      if (lines.length < 3) return { headers: [], rows: [] };

      const splitRow = (row) =>
        row
          .slice(1, -1)
          .split('|')
          .map((cell) => cell.trim());

      const headers = splitRow(lines[0]);
      const rows = lines.slice(2).map(splitRow).filter((r) => r.length === headers.length);

      return { headers, rows };
    }

    function renderTable(headers, rows) {
      const thead = document.querySelector('#enchantTable thead');
      const tbody = document.querySelector('#enchantTable tbody');
      thead.innerHTML = '';
      tbody.innerHTML = '';

      const headTr = document.createElement('tr');
      headers.forEach((h) => {
        const th = document.createElement('th');
        th.textContent = h;
        headTr.appendChild(th);
      });
      thead.appendChild(headTr);

      const fragment = document.createDocumentFragment();
      rows.forEach((row) => {
        const tr = document.createElement('tr');
        row.forEach((cell) => {
          const td = document.createElement('td');
          td.textContent = cell;
          tr.appendChild(td);
        });
        fragment.appendChild(tr);
      });
      tbody.appendChild(fragment);

      const statusText = document.getElementById('statusText');
      if (statusText) {
        statusText.textContent = `已加载 ${rows.length} 条附魔数据`;
      }
    }

    function renderEmptyState(headers, keyword) {
      renderTable(headers, []);
      const tbody = document.querySelector('#enchantTable tbody');
      const tr = document.createElement('tr');
      tr.className = 'empty-row';
      const td = document.createElement('td');
      td.colSpan = Math.max(headers.length, 1);
      td.textContent = `没有找到与“${keyword}”相关的附魔`;
      tr.appendChild(td);
      tbody.appendChild(tr);

      const statusText = document.getElementById('statusText');
      if (statusText) {
        statusText.textContent = '未找到匹配的附魔数据';
      }
    }

    function debounce(fn, delay = 120) {
      let timer = 0;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    async function loadEnchantmentSource() {
      if (typeof window.ENCHANTMENTS_MD === 'string' && window.ENCHANTMENTS_MD.trim()) {
        return window.ENCHANTMENTS_MD;
      }

      const response = await fetch('./enchantments.md');
      if (!response.ok) {
        throw new Error('无法读取本地附魔数据');
      }
      return response.text();
    }

    async function init() {
      const text = await loadEnchantmentSource();
      const { headers, rows } = parseMarkdownTable(text);

      if (!headers.length || !rows.length) {
        throw new Error('附魔数据为空或格式不正确');
      }

      renderTable(headers, rows);

      const input = document.getElementById('searchInput');
      const updateFilter = debounce(() => {
        const keyword = input.value.trim().toLowerCase();
        const filtered = !keyword
          ? rows
          : rows.filter((row) => row.join(' ').toLowerCase().includes(keyword));
        if (keyword && !filtered.length) {
          renderEmptyState(headers, input.value.trim());
          return;
        }
        renderTable(headers, filtered);
      });

      input.addEventListener('input', updateFilter);
    }

    init().catch(() => {
      const statusText = document.getElementById('statusText');
      if (statusText) {
        statusText.textContent = '附魔表加载失败，请确认 enchantments-data.js 存在且可访问';
      }
      window.gmcUi.showToast('附魔表加载失败，请确认 enchantments-data.js 存在');
    });
  </script>
</body>
</html>
